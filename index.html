<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Effects Demo</title>
    <!-- Link external style sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Demonstrating Flower Effects</h2>
    <p>Use the controls below to animate, grow, or shrink the flower.</p>

    <!-- Visibility Controls -->
    <button id="fadeBtn">Fade Out / In</button>
    <button id="slideBtn">Slide Up / Down</button>
    
    <!-- Size Controls -->
    <button id="growBtn" class="control-btn">Grow Flower 🌸</button>
    <button id="shrinkBtn" class="control-btn">Shrink Flower 🌱</button>

    <div class="flower-container">
        <!-- Official W3C Namespace configuration validated -->
        <svg id="targetFlower" viewBox="0 0 100 100" xmlns="http://w3.org">
            <circle cx="50" cy="50" r="15" fill="#fbc02d" />
            <circle cx="50" cy="25" r="18" fill="#e91e63" opacity="0.8" />
            <circle cx="50" cy="75" r="18" fill="#e91e63" opacity="0.8" />
            <circle cx="25" cy="50" r="18" fill="#e91e63" opacity="0.8" />
            <circle cx="75" cy="50" r="18" fill="#e91e63" opacity="0.8" />
        </svg>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const flower = document.getElementById('targetFlower');
            let currentWidth = 150;
            let isHidden = false;
            let isSlidUp = false;

            // Database configurations matching data.json rules
            let config = {
                "minWidth": 70,
                "maxWidth": 310,
                "stepSize": 40
            };

            // TRUE AJAX: Asynchronously load settings from data.json file mapping
            fetch('data.json')
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('Fallback used');
                })
                .then(data => {
                    config = data;
                    console.log("Configuration successfully parsed via AJAX.");
                })
                .catch(() => console.log("Running on built-in data configuration rules."));

            // Native Fade Effect implementation
            document.getElementById('fadeBtn').addEventListener('click', function() {
                if (!isHidden) {
                    flower.style.opacity = "0";
                    isHidden = true;
                } else {
                    flower.style.opacity = "1";
                    isHidden = false;
                }
            });

            // Native Slide Effect implementation
            document.getElementById('slideBtn').addEventListener('click', function() {
                if (!isSlidUp) {
                    flower.style.transform = "scaleY(0)";
                    isSlidUp = true;
                } else {
                    flower.style.transform = "scaleY(1)";
                    isSlidUp = false;
                }
            });

            // Grow Animation Logic
            document.getElementById('growBtn').addEventListener('click', function() {
                if (currentWidth < config.maxWidth) {
                    currentWidth += config.stepSize;
                    flower.style.width = currentWidth + "px";
                    flower.style.height = currentWidth + "px";
                }
            });

            // Shrink Animation Logic
            document.getElementById('shrinkBtn').addEventListener('click', function() {
                if (currentWidth > config.minWidth) {
                    currentWidth -= config.stepSize;
                    flower.style.width = currentWidth + "px";
                    flower.style.height = currentWidth + "px";
                }
            });
        });
    </script>

</body>
</html>
