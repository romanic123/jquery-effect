<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Flower Effects Demo</title>
    <!-- Link external style sheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Include jQuery CDN Library -->
    <script src="https://jquery.com"></script>
</head>
<body>

    <h2>Demonstrating Advanced Flower Effects</h2>
    <p>Use the controls below to dynamically grow petals, shrink elements, or trigger slide actions.</p>

    <!-- Visibility Controls -->
    <button id="fadeBtn">Fade Out / In</button>
    <button id="slideBtn">Slide Up / Down</button>
    
    <!-- Size Controls -->
    <button id="growBtn" class="control-btn">Grow Petals 🌸</button>
    <button id="shrinkBtn" class="control-btn">Shrink Petals 🌱</button>

    <!-- Fixed Area Container to hold both the flower and its persistent shadow -->
    <div class="flower-container">
        <!-- The Shadow Impact Element stays behind when flower slides up -->
        <div id="flowerShadow" class="shadow-impact"></div>
        
        <!-- Interactive HTML/CSS Flower Core Construction -->
        <div id="targetFlower" class="flower-core">
            <div class="center-bud"></div>
            <!-- Initial 4 base petals -->
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Local fallback configurations simulating data.json retrieval criteria
            let config = {
                "maxPetals": 12,
                "minPetals": 4,
                "speed": 400
            };

            // Attempt AJAX tracking mapping configurations from data.json file
            $.getJSON('data.json', function(data) {
                config = data;
            }).fail(function() {
                console.log("Using default configuration constraints matrix.");
            });

            // Toggle visibility using jQuery Fade
            $('#fadeBtn').click(function() {
                $('#targetFlower').fadeToggle(config.speed);
                $('#flowerShadow').fadeToggle(config.speed); // Shadow fades away with the flower
            });

            // Toggle sliding action while leaving the shadow impact element completely intact
            $('#slideBtn').click(function() {
                $('#targetFlower').slideToggle(config.speed);
                // Shadow does NOT slide, creating the desired ghost footprint silhouette effect
            });

            // Dynamic Grow Logic: Generates and maps new structural nodes into the tree
            $('#growBtn').click(function() {
                let currentPetals = $('.petal').length;

                if (currentPetals < config.maxPetals) {
                    let nextIndex = currentPetals + 1;
                    // Calculate rotational angle alignment for even visual dispersion
                    let angle = (360 / nextIndex);

                    // Create new dynamic DOM node layout structure
                    let newPetal = $('<div class="petal extra-petal"></div>');
                    $('#targetFlower').append(newPetal);

                    // Re-calculate and animate all petals into optimal distribution balance positions
                    $('.petal').each(function(index) {
                        let currentAngle = angle * index;
                        $(this).css({
                            'transform': 'rotate(' + currentAngle + 'deg) translateY(-35px)'
                        });
                    });
                }
            });

            // Dynamic Shrink Logic: Safely targeted deletion of newly added external nodes
            $('#shrinkBtn').click(function() {
                let currentPetals = $('.petal').length;

                if (currentPetals > config.minPetals) {
                    // Remove the very last added dynamic node element wrapper matching signature criteria
                    $('.petal').last().remove();

                    // Readjust and re-balance remaining layout structure rotational spacing angles smoothly
                    let postRemovalCount = $('.petal').length;
                    let angle = (360 / postRemovalCount);

                    $('.petal').each(function(index) {
                        let currentAngle = angle * index;
                        $(this).css({
                            'transform': 'rotate(' + currentAngle + 'deg) translateY(-35px)'
                        });
                    });
                }
            });
        });
    </script>

</body>
</html>
