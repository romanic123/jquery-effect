<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Effects Demo</title>
    <!-- Link external style sheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Include jQuery CDN Library -->
    <script src="https://jquery.com"></script>
</head>
<body>

    <h2>Demonstrating Flower Effects</h2>
    <p>Use the controls below to animate, grow, or shrink the flower.</p>

    <!-- Visibility Controls -->
    <button id="fadeBtn">Fade Out / In</button>
    <button id="slideBtn">Slide Up / Down</button>
    
    <!-- Size Controls -->
    <button id="growBtn" class="control-btn">Grow Flower 🌸</button>
    <button id="shrinkBtn" class="control-btn">Shrink Flower 🌱</button>

    <div class="flower-container">
        <!-- Official W3C Namespace configuration validated -->
        <svg id="targetFlower" viewBox="0 0 100 100" xmlns="http://w3.org">
            <circle cx="50" cy="50" r="15" fill="#fbc02d" />
            <circle cx="50" cy="25" r="18" fill="#e91e63" opacity="0.8" />
            <circle cx="50" cy="75" r="18" fill="#e91e63" opacity="0.8" />
            <circle cx="25" cy="50" r="18" fill="#e91e63" opacity="0.8" />
            <circle cx="75" cy="50" r="18" fill="#e91e63" opacity="0.8" />
        </svg>
    </div>

    <script>
        $(document).ready(function() {
            let currentWidth = 150;
            
            // LOCAL DATA FALLBACK: Ensures controls work immediately on GitHub Pages
            let config = {
                "minWidth": 70,
                "maxWidth": 310,
                "stepSize": 40,
                "animationSpeed": 400
            };

            // Attempting AJAX configuration fetch from data.json
            $.getJSON('data.json', function(data) {
                config = data; // Seamlessly switch to network data if available
                console.log("Configuration successfully loaded from data.json via AJAX.");
            }).fail(function() {
                console.log("Using built-in config fallback settings.");
            });

            // jQuery Fade Toggle Effect
            $('#fadeBtn').click(function() {
                $('#targetFlower').fadeToggle(config.animationSpeed);
            });

            // jQuery Slide Toggle Effect
            $('#slideBtn').click(function() {
                $('#targetFlower').slideToggle(config.animationSpeed);
            });

            // jQuery Grow Logic
            $('#growBtn').click(function() {
                if (currentWidth < config.maxWidth) {
                    currentWidth += config.stepSize;
                    $('#targetFlower').animate({
                        width: currentWidth + "px",
                        height: currentWidth + "px"
                    }, config.animationSpeed);
                }
            });

            // jQuery Shrink Logic
            $('#shrinkBtn').click(function() {
                if (currentWidth > config.minWidth) {
                    currentWidth -= config.stepSize;
                    $('#targetFlower').animate({
                        width: currentWidth + "px",
                        height: currentWidth + "px"
                    }, config.animationSpeed);
                }
            });
        });
    </script>

</body>
</html>
